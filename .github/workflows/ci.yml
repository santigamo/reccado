name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: typecheck, test & build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the engines floor (package.json) plus the primary current version.
        # 22.15.0 is the real floor: pnpm (packageManager) needs Node >= 22.13, and
        # the build toolchain (vite config loader) needs module.registerHooks(),
        # which was only added in Node 22.15.0. Anything lower fails `pnpm run build`.
        node-version: ["22.15.0", "24"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Provide dev vars for tests
        # Deliberately NOT `cp .dev.vars.example .dev.vars`: that deploy-oriented
        # template sets non-empty ACCESS_JWT_AUDIENCE/ACCESS_TEAM_DOMAIN (which
        # flips auth from local-dev-bypass to enforced, breaking security tests
        # that expect 200/404) and sets PHASE0_DEBUG_TOKEN (which violates the
        # tests/integration/api-security.test.ts assertion that it is undefined).
        run: |
          printf 'MAILBOX_ID_SECRET=%s\nACCESS_JWT_AUDIENCE=\nACCESS_TEAM_DOMAIN=\n' \
            "dev-mailbox-id-secret-v1" > .dev.vars

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Local HTTP smoke
        env:
          PHASE0_DEBUG_TOKEN: ci-debug-token
          MAILBOX_ID_SECRET: dev-mailbox-id-secret-v1
        run: |
          # The dev server reads secrets from .dev.vars (not process env), and the
          # Test step above wrote a hermetic .dev.vars without PHASE0_DEBUG_TOKEN.
          # This smoke hits the token-gated /api/debug/phase0/* routes, so it
          # needs its own .dev.vars carrying PHASE0_DEBUG_TOKEN + MAILBOX_ID_SECRET.
          printf 'PHASE0_DEBUG_TOKEN=%s\nMAILBOX_ID_SECRET=%s\nACCESS_JWT_AUDIENCE=\nACCESS_TEAM_DOMAIN=\n' \
            "$PHASE0_DEBUG_TOKEN" "$MAILBOX_ID_SECRET" > .dev.vars

          pnpm dev --host 127.0.0.1 --strictPort > /tmp/reccado-ci-dev.log 2>&1 &
          dev_pid=$!
          cleanup() {
            kill "$dev_pid" >/dev/null 2>&1 || true
            wait "$dev_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:3000/api/health >/tmp/reccado-ci-health.json; then
              break
            fi
            sleep 1
          done

          curl --silent --fail http://127.0.0.1:3000/api/health | tee /tmp/reccado-ci-health.json
          curl --silent --fail http://127.0.0.1:3000/ >/tmp/reccado-ci-root.html
          test -s /tmp/reccado-ci-root.html

          # By the time /api/health is healthy, `pnpm dev`'s predev hook has
          # already applied D1 migrations to the local database, so the
          # email-ingest tables exist and this smoke can exercise the real
          # /cdn-cgi/handler/email + /api/debug/phase0/* path end to end.
          pnpm smoke:email:local http://127.0.0.1:3000 fixtures/mime/simple-text.eml

      - name: Validate Worker bundle (dry run)
        run: pnpm exec wrangler deploy --dry-run --outdir .wrangler/dry-run

      - name: Check generated artifacts are up to date
        # src/routeTree.gen.ts is already regenerated as a side effect of the
        # Build step above (via the TanStack Start Vite plugin). Re-running
        # `pnpm generate-routes` (the standalone `tsr` CLI) here would
        # overwrite it with an incomplete file, since the CLI doesn't apply
        # the Start-specific SSR register augmentation that the Vite plugin
        # adds — so only `cf-typegen` needs to run explicitly.
        run: |
          # `wrangler types` bakes the keys of the local .dev.vars into
          # worker-configuration.d.ts, so the committed artifact must be
          # generated from a canonical, committed basis rather than whatever
          # transient .dev.vars an earlier step left behind. Regenerate from
          # .dev.vars.example (which is committed) to keep this check deterministic.
          cp .dev.vars.example .dev.vars
          pnpm run cf-typegen
          git diff --exit-code -- worker-configuration.d.ts src/routeTree.gen.ts

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
